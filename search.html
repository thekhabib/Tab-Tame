<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TabTame — Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 640px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      overflow: hidden;
    }

    .search-wrap {
      padding: 12px;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; background: #fff;
    }

    #searchInput {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }
    #searchInput:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15); }

    .tab-list { max-height: 440px; overflow-y: auto; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background .1s;
    }
    .tab-item:hover   { background: #f8f9fa; }
    .tab-item.focused { background: #e8f0fe; }

    .tab-favicon { width: 16px; height: 16px; flex-shrink: 0; }

    .tab-info { flex: 1; min-width: 0; }
    .tab-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #1f1f1f;
    }
    .tab-url {
      font-size: 11px; color: #999;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }

    .tab-win {
      font-size: 10px; color: #bbb;
      flex-shrink: 0; white-space: nowrap;
    }

    .no-results {
      padding: 32px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    .count {
      font-size: 11px; color: #aaa;
      padding: 6px 14px 4px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1f1f1f; color: #e8eaed; }
      .search-wrap { background: #1f1f1f; border-bottom-color: #2d2d2d; }
      #searchInput { background: #2a2a2a; border-color: #4a4a4a; color: #e8eaed; }
      #searchInput:focus { border-color: #8ab4f8; box-shadow: 0 0 0 2px rgba(138,180,248,.2); }
      .tab-item { border-bottom-color: #2d2d2d; }
      .tab-item:hover { background: #2a2a2a; }
      .tab-item.focused { background: #1e3a5f; }
      .tab-title { color: #e8eaed; }
      .tab-url, .count, .no-results { color: #80868b; }
      .tab-win { color: #5f6368; }
    }
  </style>
</head>
<body>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search tabs by title or URL…" autofocus>
  </div>
  <div class="tab-list" id="tabList"></div>
  <script src="search.js"></script>
</body>
</html>
