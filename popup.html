<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1f1f1f;
      background: #fff;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .logo { font-weight: 700; font-size: 15px; color: #1a73e8; }
    .subtitle { font-size: 11px; color: #888; margin-top: 2px; }

    /* Toggle switch */
    .switch {
      position: relative; width: 44px; height: 24px; flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #ccc;
      border-radius: 24px; cursor: pointer; transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; left: 4px; top: 4px;
      background: #fff; border-radius: 50%; transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    input:checked + .slider { background: #1a73e8; }
    input:checked + .slider::before { transform: translateX(20px); }

    /* Rows */
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid #f0f0f0;
    }
    .row-label { color: #444; }
    .row-label small { display: block; font-size: 11px; color: #999; margin-top: 1px; }

    /* Current site */
    .site-row {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .site-domain {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 150px;
    }
    .site-rule-select {
      font-size: 11px; padding: 4px 8px;
      border: 1px solid #1a73e8; color: #1a73e8;
      border-radius: 20px; background: transparent;
      cursor: pointer; outline: none; flex-shrink: 0;
    }
    .site-rule-select:focus { box-shadow: 0 0 0 2px rgba(26,115,232,.2); }

    /* Stats */
    .stats {
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f0f0f0;
      color: #555;
    }
    .stats-num { font-weight: 700; font-size: 20px; color: #1a73e8; }
    .stats-label { font-size: 11px; color: #999; }

    /* Footer */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
    }
    .btn-options {
      font-size: 12px; color: #1a73e8; background: none;
      border: none; cursor: pointer; padding: 0; text-decoration: underline;
    }
    .shortcut { font-size: 11px; color: #bbb; }

    .disabled-overlay { opacity: .45; pointer-events: none; }

    @media (prefers-color-scheme: dark) {
      body { color: #e8eaed; background: #1f1f1f; }
      .logo { color: #8ab4f8; }
      .subtitle { color: #9aa0a6; }
      .header, .row, .site-row, .stats { border-bottom-color: #2d2d2d; }
      .row-label { color: #d0d3d6; }
      .row-label small, .stats-label, .site-domain + .site-row > div > div, .shortcut { color: #80868b; }
      .slider { background: #5f6368; }
      input:checked + .slider { background: #8ab4f8; }
      .site-rule-select { border-color: #8ab4f8; color: #8ab4f8; }
      .site-rule-select:focus { box-shadow: 0 0 0 2px rgba(138,180,248,.25); }
      .stats { color: #d0d3d6; }
      .stats-num { color: #8ab4f8; }
      .btn-options { color: #8ab4f8; }
    }
  </style>
</head>
<body>

  <!-- Header: logo + master toggle -->
  <div class="header">
    <div>
      <div class="logo">TabTame</div>
      <div class="subtitle">Same-tab link opener</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="masterToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Current site -->
  <div class="site-row" id="siteSection">
    <div>
      <div style="font-size:11px;color:#999;margin-bottom:2px;">Current site</div>
      <div class="site-domain" id="siteDomain">—</div>
    </div>
    <select class="site-rule-select" id="siteRule">
      <option value="default">Default</option>
      <option value="same">Force same</option>
      <option value="new">Allow new</option>
    </select>
  </div>

  <!-- Quick toggles -->
  <div class="row" id="focusRow">
    <div class="row-label">
      Focus mode
      <small>Keep same-site links in new tab</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="focusToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row" id="dupeRow">
    <div class="row-label">
      Block duplicate tabs
      <small>Focus existing tab instead</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="dupeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div>
      <div class="stats-num" id="statNum">0</div>
      <div class="stats-label">links redirected</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-options" id="btnOptions">All settings →</button>
    <span class="shortcut">Alt+Shift+S</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
