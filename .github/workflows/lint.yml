name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json is valid JSON
        run: |
          python3 -c "import json; json.load(open('manifest.json'))"
          echo "manifest.json is valid JSON."

      - name: Check required fields
        run: |
          python3 - <<'PY'
          import json, sys
          m = json.load(open('manifest.json'))
          required = ['manifest_version', 'name', 'version', 'description', 'icons', 'background', 'content_scripts', 'permissions']
          missing = [k for k in required if k not in m]
          if missing:
              print(f"::error::Missing required fields: {missing}")
              sys.exit(1)
          if m['manifest_version'] != 3:
              print(f"::error::manifest_version must be 3, got {m['manifest_version']}")
              sys.exit(1)
          if len(m['description']) > 132:
              print(f"::error::description exceeds 132 chars (Chrome Web Store limit): {len(m['description'])}")
              sys.exit(1)
          print("manifest.json passes basic checks.")
          PY

  web-ext-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run web-ext lint
        run: npx --yes web-ext lint --source-dir=. --self-hosted || true
